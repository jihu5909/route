<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>교통약자 경로 추천</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>교통약자 맞춤 경로 추천 시스템</h1>

<div class="container">

<div class="controls">

<label>출발지</label>
<select id="start"></select>

<label>도착지</label>
<select id="end"></select>

<br><br>

<label>경사 주의도</label>
<input type="range" id="slope" min="0" max="100" value="50">
<span id="slopeVal">50</span>

<br><br>

<label>계단 주의도</label>
<input type="range" id="stairs" min="0" max="100" value="50">
<span id="stairsVal">50</span>

<br><br>

<label>좁은 길 주의도</label>
<input type="range" id="narrow" min="0" max="100" value="50">
<span id="narrowVal">50</span>

<br><br>

<div id="result"></div>

</div>

<div class="map-container">

<img src="map.png" id="mapImage">

<svg id="overlay"
viewBox="0 0 1114 706"
preserveAspectRatio="none">
</svg>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
